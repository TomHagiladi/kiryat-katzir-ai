<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הצבעה · מה נלמד היום?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    font-family:'Heebo',sans-serif;
    background:#0a0e27;
    background-image:
      radial-gradient(at 15% 20%,rgba(99,102,241,.35) 0,transparent 50%),
      radial-gradient(at 85% 85%,rgba(236,72,153,.30) 0,transparent 50%);
    color:#fff;
    min-height:100vh;
    padding:20px 16px 40px;
  }
  .wrap{max-width:560px;margin:0 auto}
  header{text-align:center;margin-bottom:24px}
  h1{
    font-size:34px;font-weight:900;line-height:1.1;
    background:linear-gradient(135deg,#fff,#c7d2fe,#f0abfc);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    margin-bottom:8px;
  }
  .lead{font-size:17px;color:rgba(255,255,255,.8);font-weight:400;line-height:1.5}
  .step-info{
    background:rgba(253,224,71,.12);
    border:1px solid rgba(253,224,71,.4);
    color:#fde047;
    padding:14px 18px;
    border-radius:14px;
    text-align:center;
    font-weight:700;
    font-size:17px;
    margin-bottom:18px;
  }
  .card{
    position:relative;
    display:grid;
    grid-template-columns:auto 1fr auto;
    gap:14px;
    align-items:center;
    padding:16px 18px;
    background:rgba(255,255,255,.07);
    border:2px solid rgba(255,255,255,.12);
    border-radius:18px;
    margin-bottom:12px;
    cursor:pointer;
    transition:all .25s ease;
    overflow:hidden;
  }
  .card::before{
    content:"";position:absolute;inset:0;
    background:var(--grad);opacity:.1;z-index:0;
  }
  .card>*{position:relative;z-index:1}
  .card:active{transform:scale(.98)}
  .card.picked{
    border-color:#fde047;
    background:rgba(253,224,71,.10);
  }
  .card.disabled{opacity:.35;pointer-events:none}
  .icon{
    width:54px;height:54px;border-radius:14px;
    background:var(--grad);
    display:grid;place-items:center;font-size:26px;
  }
  .info h2{font-size:19px;font-weight:700;margin-bottom:3px;line-height:1.2}
  .info p{font-size:14px;color:rgba(255,255,255,.72);line-height:1.35}
  .rank{
    width:44px;height:44px;
    border-radius:50%;
    background:rgba(255,255,255,.08);
    border:2px solid rgba(255,255,255,.2);
    display:grid;place-items:center;
    font-size:20px;font-weight:900;
    color:rgba(255,255,255,.4);
  }
  .picked .rank{
    background:#fde047;color:#0a0e27;border-color:#fde047;
  }
  .actions{margin-top:18px;display:grid;gap:10px}
  button{
    font-family:inherit;font-size:18px;font-weight:700;
    padding:16px;border-radius:14px;border:none;cursor:pointer;
    transition:all .2s ease;
  }
  .btn-primary{
    background:linear-gradient(135deg,#6366f1,#ec4899);
    color:#fff;
  }
  .btn-primary:disabled{opacity:.4;cursor:not-allowed}
  .btn-reset{
    background:rgba(255,255,255,.08);color:#fff;
    border:1px solid rgba(255,255,255,.2);
  }
  .done{
    text-align:center;padding:40px 20px;
    background:rgba(34,197,94,.12);
    border:1px solid rgba(34,197,94,.4);
    border-radius:20px;
  }
  .done .check{
    width:80px;height:80px;margin:0 auto 16px;
    border-radius:50%;
    background:#22c55e;
    display:grid;place-items:center;
    font-size:44px;
  }
  .done h2{font-size:28px;margin-bottom:10px;font-weight:900}
  .done p{color:rgba(255,255,255,.8);font-size:17px;line-height:1.5}
  .hidden{display:none}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>הצבעה 🗳️</h1>
    <p class="lead">בחרו את 3 הכלים שהכי תרצו ללמוד היום — לפי סדר חשיבות</p>
  </header>

  <div id="voteArea">
    <div class="step-info" id="stepInfo">שלב 1 מתוך 3 · בחרו את המקום הראשון 🥇</div>
    <div id="cards"></div>
    <div class="actions">
      <button class="btn-reset" id="resetBtn" type="button">התחלה מחדש</button>
      <button class="btn-primary" id="submitBtn" type="button" disabled>שליחת הצבעה</button>
    </div>
  </div>

  <div id="doneArea" class="done hidden">
    <div class="check">✓</div>
    <h2>תודה על ההצבעה!</h2>
    <p>ההצבעה שלכם נקלטה. עכשיו חזרו למסך של תום כדי לראות את התוצאות בזמן אמת.</p>
  </div>
</div>

<script src="config.js"></script>
<script>
const API=window.VOTING_API;

const OPTIONS=[
  {id:'gemini',icon:'💎',title:'Gems ב-Gemini + Storybook',desc:'עוזרים חכמים + ספרי ילדים',grad:'linear-gradient(135deg,#4f46e5,#06b6d4)'},
  {id:'perplexity',icon:'🔎',title:'Perplexity',desc:'חיפוש חכם עם מקורות',grad:'linear-gradient(135deg,#0ea5e9,#14b8a6)'},
  {id:'napkin',icon:'📊',title:'Napkin AI',desc:'טקסט → דיאגרמות ואינפוגרפיקות',grad:'linear-gradient(135deg,#f59e0b,#ef4444)'},
  {id:'suno',icon:'🎵',title:'Suno',desc:'יצירת שירים מתיאור בעברית',grad:'linear-gradient(135deg,#ec4899,#8b5cf6)'},
  {id:'morai',icon:'🎓',title:'Morai',desc:'פלטפורמת AI ישראלית למורים',grad:'linear-gradient(135deg,#10b981,#3b82f6)'},
  {id:'notebooklm',icon:'📚',title:'NotebookLM + תקיות',desc:'מסמכים שלכם כמקור ידע',grad:'linear-gradient(135deg,#a855f7,#ec4899)'},
  {id:'classroom',icon:'🏫',title:'AI ב-Google Classroom',desc:'שאלונים וסיכומים אוטומטיים',grad:'linear-gradient(135deg,#22c55e,#eab308)'}
];

const state={first:null,second:null,third:null};
const cardsEl=document.getElementById('cards');
const stepEl=document.getElementById('stepInfo');
const submitBtn=document.getElementById('submitBtn');
const resetBtn=document.getElementById('resetBtn');

function currentStep(){
  if(!state.first)return 1;
  if(!state.second)return 2;
  if(!state.third)return 3;
  return 4;
}
function stepLabel(s){
  if(s===1)return 'שלב 1 מתוך 3 · בחרו את המקום הראשון 🥇';
  if(s===2)return 'שלב 2 מתוך 3 · בחרו את המקום השני 🥈';
  if(s===3)return 'שלב 3 מתוך 3 · בחרו את המקום השלישי 🥉';
  return 'מוכנים! לחצו על "שליחת הצבעה" ✅';
}

function render(){
  cardsEl.innerHTML='';
  OPTIONS.forEach(o=>{
    let rank='';let picked=false;let disabled=false;
    if(state.first===o.id){rank='1';picked=true}
    else if(state.second===o.id){rank='2';picked=true}
    else if(state.third===o.id){rank='3';picked=true}
    else if(currentStep()===4){disabled=true}

    const el=document.createElement('div');
    el.className='card'+(picked?' picked':'')+(disabled?' disabled':'');
    el.style.setProperty('--grad',o.grad);
    el.innerHTML=`
      <div class="icon">${o.icon}</div>
      <div class="info"><h2>${o.title}</h2><p>${o.desc}</p></div>
      <div class="rank">${rank||'?'}</div>
    `;
    el.addEventListener('click',()=>pick(o.id));
    cardsEl.appendChild(el);
  });
  const s=currentStep();
  stepEl.textContent=stepLabel(s);
  submitBtn.disabled=s!==4;
}

function pick(id){
  if([state.first,state.second,state.third].includes(id))return;
  const s=currentStep();
  if(s===1)state.first=id;
  else if(s===2)state.second=id;
  else if(s===3)state.third=id;
  render();
}

resetBtn.addEventListener('click',()=>{
  state.first=state.second=state.third=null;
  render();
});

submitBtn.addEventListener('click',async()=>{
  if(!API||API.indexOf('PASTE_')===0){
    alert('המערכת עוד לא הוגדרה. פנו לתום.');
    return;
  }
  submitBtn.disabled=true;
  submitBtn.textContent='שולח...';
  try{
    await fetch(API,{
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({first:state.first,second:state.second,third:state.third})
    });
    document.getElementById('voteArea').classList.add('hidden');
    document.getElementById('doneArea').classList.remove('hidden');
  }catch(e){
    alert('שגיאה בשליחה. נסו שוב.');
    submitBtn.disabled=false;
    submitBtn.textContent='שליחת הצבעה';
  }
});

render();
</script>
</body>
</html>
